<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>联机对抗 - 贪吃蛇</title>
    <!-- 引入 Socket.io 客户端脚本 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: Arial; margin: 0; padding-top: 10px; touch-action: none; overflow: hidden; }
        canvas { border: 5px solid #ecf0f1; background: #000; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; width: 400px; margin-bottom: 10px; align-items: center; }
        h2 { margin: 0; font-size: 20px; }
        #status { background: #e67e22; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        
        /* 虚拟按键样式 */
        .d-pad { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px; gap: 10px; margin-top: 20px; justify-content: center; }
        .d-btn { background: rgba(255,255,255,0.1); border: 2px solid #ecf0f1; border-radius: 10px; color: white; font-size: 24px; display: flex; justify-content: center; align-items: center; cursor: pointer; user-select: none; }
        .d-btn:active { background: rgba(255,255,255,0.4); }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        /* 死亡遮罩层 */
        #death-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
        }
        #death-overlay h1 { color: #e74c3c; font-size: 48px; margin-bottom: 10px; }
        #death-overlay p { font-size: 24px; margin-bottom: 20px; }
        #death-overlay button { 
            padding: 15px 30px; font-size: 20px; cursor: pointer; 
            background: #27ae60; color: white; border: none; border-radius: 8px; 
            transition: background 0.3s;
        }
        #death-overlay button:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="death-overlay">
        <h1>💀 您已阵亡</h1>
        <p id="final-score">得分: 0</p>
        <button onclick="respawn()">重新加入战场</button>
    </div>

    <div class="header">
        <h2>⚔️ 联机战场</h2>
        <span id="status">正在连接服务器...</span>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="d-pad">
        <div class="d-btn btn-up" onmousedown="sendDir('UP')" ontouchstart="sendDir('UP')">W</div>
        <div class="d-btn btn-left" onmousedown="sendDir('LEFT')" ontouchstart="sendDir('LEFT')">A</div>
        <div class="d-btn btn-down" onmousedown="sendDir('DOWN')" ontouchstart="sendDir('DOWN')">S</div>
        <div class="d-btn btn-right" onmousedown="sendDir('RIGHT')" ontouchstart="sendDir('RIGHT')">D</div>
    </div>
    
    <a href="index.html" style="color: #bdc3c7; text-decoration: none; margin-top: 20px;">返回主页</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const deathOverlay = document.getElementById('death-overlay');
        const finalScoreText = document.getElementById('final-score');
        
        // 1. 连接本地服务器的 4000 端口
        const socket = io('http://127.0.0.1:4000'); 

        // 2. 发送方向逻辑
        function sendDir(dir, event) {
            if(event) event.preventDefault();
            socket.emit('move', dir);
        }

        // 3. 复活逻辑
        function respawn() {
            socket.emit('requestRespawn');
            deathOverlay.style.display = 'none';
        }

        // 4. 键盘监听
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') sendDir("UP");
            if (key === 's' || key === 'arrowdown') sendDir("DOWN");
            if (key === 'a' || key === 'arrowleft') sendDir("LEFT");
            if (key === 'd' || key === 'arrowright') sendDir("RIGHT");
        });

        // 5. 核心：接收状态并渲染
        socket.on('gameUpdate', (gameState) => {
            const me = gameState.players[socket.id];
            
            // 检查自己是否死亡
            if (me && me.isDead) {
                deathOverlay.style.display = 'flex';
                finalScoreText.innerText = `本次得分: ${me.score}`;
            }

            // 更新在线状态 UI
            const playersArr = Object.values(gameState.players);
            const aliveCount = playersArr.filter(p => !p.isDead).length;
            statusEl.innerText = `在线: ${playersArr.length} | 存活: ${aliveCount}`;
            statusEl.style.background = (me && me.isDead) ? "#c0392b" : "#27ae60";

            // 清空画布
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 400, 400);

            // 画食物
            ctx.fillStyle = "red";
            ctx.fillRect(gameState.food.x, gameState.food.y, 18, 18);

            // 画所有存活的蛇
            Object.keys(gameState.players).forEach(id => {
                const p = gameState.players[id];
                if (p.isDead) return; // 死亡不渲染

                const isMe = (id === socket.id);
                p.snake.forEach((seg, index) => {
                    if (index === 0) {
                        ctx.fillStyle = isMe ? "white" : "yellow"; // 头颜色
                    } else {
                        ctx.fillStyle = p.color; // 身体颜色
                    }
                    ctx.fillRect(seg.x, seg.y, 18, 18);
                });
            });
        });

        // 连接断开处理
        socket.on('disconnect', () => {
            statusEl.innerText = "已断开连接";
            statusEl.style.background = "#7f8c8d";
        });
    </script>
</body>
</html>
