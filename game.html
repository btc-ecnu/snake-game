<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - V2.0</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: Arial; margin: 0; padding-top: 20px; touch-action: none; /* 阻止移动端页面滚动 */ }
        canvas { border: 5px solid #ecf0f1; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #000; margin-top: 10px; max-width: 100%; }
        .panel { display: flex; gap: 20px; font-size: 18px; margin-bottom: 10px; }
        #ui-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 30px; border-radius: 10px; text-align: center; display: block; }
        button { margin: 5px; padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background: #3498db; color: white; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="panel">
        <span>得分: <span id="score">0</span></span>
        <span>最佳: <span id="highScore">0</span></span>
    </div>
    
    <div style="position: relative;">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        <div id="ui-layer">
            <h2 id="ui-msg">选择难度</h2>
            <div id="controls">
                <!-- 速度 = 100ms / 难度系数 -->
                <button onclick="startGame(0.5)">简单</button>
                <button onclick="startGame(0.75)">中等</button>
                <button onclick="startGame(1)">困难</button>
            </div>
        </div>
    </div>
    
    <p>操作说明：支持 方向键 / WASD / 鼠标点击 / 屏幕触控</p>
    <a href="index.html" style="color: #bdc3c7; text-decoration: none; margin-top: 20px;">返回主页</a>

    <script>
        const canvas = document.getElementById('snakeGame');
const ctx = canvas.getContext('2d');
const uiLayer = document.getElementById('ui-layer');
const uiMsg = document.getElementById('ui-msg');
const controls = document.getElementById('controls');

const box = 20;
let snake, food, direction, gameLoop, score, currentSpeed;

// 读取本地存储的历史最高分
let highScore = localStorage.getItem('snakeHighScore') || 0;
document.getElementById('highScore').innerText = highScore;

// 生成食物坐标的辅助函数 (修复了之前未能覆盖边缘的边界计算问题)
function generateFood() {
    return {
        x: Math.floor(Math.random() * 20) * box,
        y: Math.floor(Math.random() * 20) * box
    };
}

// 初始化/重置游戏变量
function initVars() {
    snake = [{x: 9 * box, y: 10 * box}];
    food = generateFood();
    direction = null; // 初始静止，等待玩家输入方向
    score = 0;
    document.getElementById('score').innerText = score;
}

// 启动游戏逻辑
function startGame(speedMultiplier) {
    initVars();
    uiLayer.style.display = 'none'; // 隐藏 UI 层
    
    // 基础速度 100ms，简单模式 0.5x 对应 200ms
    currentSpeed = 100 / speedMultiplier; 
    
    if(gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(draw, currentSpeed);
}

function gameOver() {
    clearInterval(gameLoop);
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        document.getElementById('highScore').innerText = highScore;
    }
    uiMsg.innerText = `游戏结束！得分: ${score}`;
    uiLayer.style.display = 'block'; // 显示 UI 层供重新开始
}

// --- 事件监听 (键盘 WASD + 方向键) ---
document.addEventListener("keydown", (event) => {
    const key = event.key.toLowerCase();
    if ((key === 'arrowleft' || key === 'a') && direction !== "RIGHT") direction = "LEFT";
    else if ((key === 'arrowup' || key === 'w') && direction !== "DOWN") direction = "UP";
    else if ((key === 'arrowright' || key === 'd') && direction !== "LEFT") direction = "RIGHT";
    else if ((key === 'arrowdown' || key === 's') && direction !== "UP") direction = "DOWN";
});

// --- 事件监听 (鼠标/触控交互) ---
function handleTouchOrClick(event) {
    if (uiLayer.style.display === 'block') return; // 暂停/结束状态下忽略输入
    event.preventDefault(); // 阻止移动端浏览器默认的下拉刷新/滚动行为
    
    const rect = canvas.getBoundingClientRect();
    const clientX = event.touches ? event.touches[0].clientX : event.clientX;
    const clientY = event.touches ? event.touches[0].clientY : event.clientY;
    
    const clickX = clientX - rect.left;
    const clickY = clientY - rect.top;
    
    const headX = snake[0].x;
    const headY = snake[0].y;
    
    // 计算相对位移向量
    const dx = clickX - headX;
    const dy = clickY - headY;
    
    // 判断绝对值大小，决定横向或纵向移动
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && direction !== "LEFT") direction = "RIGHT";
        else if (dx < 0 && direction !== "RIGHT") direction = "LEFT";
    } else {
        if (dy > 0 && direction !== "UP") direction = "DOWN";
        else if (dy < 0 && direction !== "DOWN") direction = "UP";
    }
}
canvas.addEventListener("mousedown", handleTouchOrClick);
canvas.addEventListener("touchstart", handleTouchOrClick, {passive: false});

// 碰撞实体检测
function collision(head, array) {
    for(let i = 0; i < array.length; i++){
        if(head.x === array[i].x && head.y === array[i].y) return true;
    }
    return false;
}

// --- 主渲染函数 (重构了生命周期) ---
function draw() {
    // 【阶段 1：渲染层 Render】
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, 400, 400);

    for(let i = 0; i < snake.length; i++){
        ctx.fillStyle = (i === 0) ? "green" : "lime";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
    }
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    // 【阶段 2：阻塞器 Blocker】
    // 如果没有方向，说明游戏刚开始，画面画完后直接退出函数，不进行物理更新
    if (!direction) return; 

    // 【阶段 3：坐标计算 Compute】
    let snakeX = snake[0].x;
    let snakeY = snake[0].y;

    if (direction === "LEFT") snakeX -= box;
    if (direction === "UP") snakeY -= box;
    if (direction === "RIGHT") snakeX += box;
    if (direction === "DOWN") snakeY += box;

    let newHead = { x: snakeX, y: snakeY };

    // 【阶段 4：环境碰撞 Environment Collision】
    if (snakeX < 0 || snakeY < 0 || snakeX >= 400 || snakeY >= 400) {
        gameOver();
        return;
    }

    // 【阶段 5：状态决议 State Resolution】
    if(snakeX === food.x && snakeY === food.y) {
        score++;
        document.getElementById('score').innerText = score;
        food = generateFood(); // 生成新食物
        // 注意：这里没有执行 pop()，这正是蛇变长的原理
    } else {
        snake.pop(); // 没吃到食物，移除当前物理空间中的尾巴
    }

    // 【阶段 6：实体碰撞 Entity Collision】
    // 必须在 pop() 之后执行，这样才不会误判即将离开那个格子的尾巴
    if (collision(newHead, snake)) {
        gameOver();
        return;
    }

    // 【阶段 7：数据写入 Commit】
    snake.unshift(newHead);
}
    </script>
</body>
</html>
